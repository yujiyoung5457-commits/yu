<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        *{
            margin: 0;
            padding: 0;
            /* outline: 1px solid rgb(0, 60, 255); */
        }
        @font-face{
            font-family: "ongul";
            src: url("font/ongul.ttf");
        }
.all{
    display: flex;
    align-items: flex-start;
    /* justify-content: center; */
    gap: 80px;
    margin-left: 80px;
}
.leftBox{
    margin-top: 90px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 100px;
}
.rightBox{
    margin-top: -90px;
    display: flex;
    /* gap: 90px; */
    /* justify-content: center; */
    align-items: center;
    /* border: 1px solid rgb(17, 0, 255); */
    flex-direction: column;
}

.cardBox{
    width: 650px;
    height: 400px;
    gap: 20px;
    z-index: 5;
    display: flex;
    justify-content: center;
    align-items: center;
    /* background-color: aquamarine; */
    margin: 20px auto;
}
.card1, .card2, .card3{
    width: 200px;
    height: 400px;
    z-index: 50;
    transition: 1s;
    background-image: url("./img/card.png");
    background-position: center;
    background-repeat: no-repeat;
    background-size: contain;
}
.card2:hover{
    width: 200px;
    height: 400px;
    background-image: url("./img/back.png");
    background-position: center;
    background-repeat: no-repeat;
    background-size: contain;
}
.card1:hover{
    width: 200px;
    height: 400px;
    background-image: url("./img/back1.png");
    background-position: center;
    background-repeat: no-repeat;
    background-size: contain;
}

.card3:hover{
    width: 200px;
    height: 400px;
    background-image: url("./img/back3.png");
    background-position: center;
    background-repeat: no-repeat;
    background-size: contain;
}
.miniBox{
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    /* border: 1px solid red; */
     
}
.inminiBox1{
    width: 700px;
    height: 100px;
    background-color: rgb(255, 214, 223);
    border: 5px solid rgb(255, 134, 154);
    border-radius: 30px;
    text-align: center;
    font-size: 90px;
    color: rgb(255, 255, 255);
    font-family: "ongul";
    -webkit-text-stroke: 3px rgb(255, 134, 154);
}
.inminiBox2{
    width: 700px;
    height: 460px;
    background-color: rgb(255, 251, 214);
    border-radius: 30px;
    border: 5px solid rgb(255, 134, 154);
}
.headfont{
    font-family: "ongul";
    -webkit-text-stroke: 3px rgb(255, 134, 154);
    color: rgb(255, 249, 250);
    font-size: 150px;
}
.str{
    background-image: url("./img/str.png");
    background-position: center;
    background-repeat: no-repeat;
    background-size: cover;
    width: 500px;
    height: 500px;
    position: absolute;
    left: 0px;
    bottom: 0px;
    z-index: -4; 
}
.all{
    position: relative;
}
.highlight{
    width: 100px;
    height: 8px;
    border-radius: 30px;
    background-color: rgb(255, 248, 250);
    position: absolute;
    left: 30px;
    top: 10px;
}
.kesan{
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 5;  
    /* position:relative; */
    /* top: 40px;
    left: -70%; */
}
.outBox{
    width: 500px;
    height: 700px;
    background: linear-gradient(-180deg, rgb(255, 185, 200), rgb(255, 218, 224));
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    /* top: 50px; */
    border-radius: 40px;
    border: 5px solid rgb(248, 135, 164);
}
#dis{
    width: 400px;
    height: 120px;
    background-color: rgb(95, 172, 175);
    border: 5px solid rgb(50, 133, 119);
    border-radius: 30px;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    padding-right: 5px;
    position: absolute;
    left: 40px;
    top: 40px;
    font-size: 30px;
    font-family: "ongul";
    text-align: left;
    color: rgb(255, 248, 250);
    font-size: 45px;
}
.text{
    position: absolute;
    top: 30px;
    right: 30px;
}
.nu{
    position: absolute;
    top: 180px;
    width: 400px;
    height: 500px;
    display: flex;
    align-items: center;
    line-height: 80px;
    flex-wrap: wrap;
    justify-content: space-between;
}
img{
    width: 60px;
    height: 60px;
    position: absolute;
    left: 120px;
    top: 15px;
}
.num1{
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background-color: rgb(255, 249, 249);
    font-size: 45px;
    font-weight: 600;
    font-family: "ongul";
    text-align: center;
    color: rgb(226, 90, 113);
    border: 3px solid rgb(243, 127, 166);
}
.num1:hover{
    background-color: rgb(183, 241, 255);
    border: 3px solid rgb(59, 180, 174);
    color: rgb(59, 180, 174);
    }
#zero{
    width: 200px;
    height: 80px;
    border-radius: 20px;
}
#btn{
     width: 90px;
    height: 90px;
    border-radius: 50%;
    background-color: rgb(255, 241, 164);
    font-size: 40px;
    text-align: center;
    color: rgb(226, 90, 113);
    border: 3px solid rgb(243, 127, 166);
}
#btn:hover{
    background-color: rgb(183, 241, 255);
    border: 3px solid rgb(59, 180, 174);
    color: rgb(59, 180, 174);
}
.yellow{
    background-color: rgb(255, 241, 164);
}
.boxBackground{
    background-color: rgb(143, 235, 219);
    width: 100%;
    height: 100vh;
    position: absolute;
    z-index: -8; 
}
.imageSanrio{
    background-image: url("./img/sanrio.png");
    background-position: center;
    background-repeat: no-repeat;
    background-size: contain;
    display: flex;
    position: fixed;
    right: 0;
    bottom: 0;
    width: 500px;
    height: 300px;
    z-index: 80; 
}

    </style> 
</head>

</div>

</html>
